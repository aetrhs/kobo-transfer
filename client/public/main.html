<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kepub Sync Library</title>
  <style>
    body {
      font-family: sans-serif;
      line-height: 1.5;
      font-size: 1rem;
      color: #333;
      margin: 20px auto;
      background: white;
    }

    #login-div,
    #library-section {
      text-align: center;
      margin-top: 50px;
      padding: 0 20px;
    }

    #user-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    #logout-btn {
      text-decoration: underline;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background-color: transparent;
    }

    input {
      padding: 10px;
      text-transform: uppercase;
      font-size: 1.2rem;
      width: 150px;
      text-align: center;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    ol {
      text-align: left;
      margin-top: 30px;
      padding: 0 10px;
    }

    li {
      padding: 15px 0;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    li:last-child {
      border-bottom: none;
    }

    .download-btn {
      text-decoration: none;
      border: 1px solid #252525;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 1rem;
    }

    #status {
      margin-top: 50px;
      font-size: 0.8rem;
      color: #888;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div id="login-div">
    <h2>Kepub Sync Login</h2>
    <p>Enter login PIN to access your library:</p>
    <input type="text" id="pin-input" placeholder="000000" maxlength="6">
    <br>
    <button onclick="login()">Log In</button>
  </div>

  <div id="library-section" class="hidden">
    <div id="user-section">
      <p style="text-align: left;">Hello, <span id="user-email"></span>!</p>
      <button id="logout-btn" onclick="logout()">Log out</button>
    </div>
    <div id="main-library">
      <h2>My Books</h2>
      <ol id="book-list"></ol>
    </div>
    
  </div>

  <div id="status"></div>

  <script>
    var token = localStorage.getItem('token');
    var statusEl = document.getElementById('status');

    function log(msg) {
      if (statusEl) statusEl.innerHTML = msg;
      console.log(msg);
    }

    if (token) {
      showDashboard();
    }

    function login() {
      var pinValue = document.getElementById('pin-input').value.toUpperCase();
      var xhr = new XMLHttpRequest();
      xhr.open("POST", "/api/auth/login", true);
      xhr.setRequestHeader("Bypass-Tunnel-Reminder", "true");
      xhr.setRequestHeader("Content-Type", "application/json");

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            var res = JSON.parse(xhr.responseText);
            localStorage.setItem('token', res.token);
            showDashboard();
          } else {
            log("Login failed: " + xhr.status);
          }
        }
      };
      xhr.send(JSON.stringify({ pin: pinValue, isKobo: true }));
    }

    function showDashboard() {
      document.getElementById('login-div').style.display = 'none';
      document.getElementById('library-section').style.display = 'block';
      getUser();
      getBooks();
    }

    function getUser() {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "/api/auth/profile", true);
      xhr.setRequestHeader("Bypass-Tunnel-Reminder", "true");
      xhr.setRequestHeader("Authorization", "Bearer " + localStorage.getItem('token'));
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var user = JSON.parse(xhr.responseText);
          document.getElementById('user-email').innerText = user.email;
        }
      };
      xhr.send();
    }

    function getBooks() {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "/api/books/my-books", true);
      xhr.setRequestHeader("Bypass-Tunnel-Reminder", "true");
      xhr.setRequestHeader("Authorization", "Bearer " + localStorage.getItem('token'));

      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var books = JSON.parse(xhr.responseText);
            var listEl = document.getElementById('book-list');
            listEl.innerHTML = '';

            if (books.length === 0) {
              listEl.innerHTML = '<li>No books found.</li>';
            } else {
              for (var i = 0; i < books.length; i++) {
                var li = document.createElement('li');
                var statusText = books[i].isDownloaded;
                var titleSpan = document.createElement('span');
                titleSpan.className = 'book-title';
                titleSpan.innerText = books[i].title + (statusText ? ' ✓' : '');

                var link = document.createElement('a');
                link.className = 'download-btn';
                link.href = '/api/books/download/' + books[i]._id + '?token=' + localStorage.getItem('token');
                link.innerText = books[i].isDownloaded ? 'Re-download' : 'Download';

                li.appendChild(titleSpan);
                li.appendChild(link);
                listEl.appendChild(li);
              }
            }
          } catch (e) { log("Data Error: " + e.message); }
        }
      };
      xhr.send();
    }

    function logout() {
      localStorage.removeItem('token');
      sessionStorage.clear();
      window.location.href = "/?logout=" + Date.now();
    }
  </script>
</body>

</html>
